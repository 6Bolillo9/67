<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mi ubicación en mapa</title>
</head>

<body style="text-align:center;font-family:sans-serif">

  <h1>Mi ubicación en mapa</h1>

  <button onclick="getLocation()">Obtener ubicación</button>

  <p id="info"></p>

  <iframe id="map" width="100%" height="400" style="border:0" loading="lazy"></iframe>

  <script>
    function getLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(showMap);
      } else {
        document.getElementById("info").innerText = "Tu navegador no soporta geolocalización";
      }
    }

    function showMap(position) {
      let lat = position.coords.latitude;
      let lon = position.coords.longitude;

      document.getElementById("info").innerText =
        "Lat: " + lat + " | Lon: " + lon;

      document.getElementById("map").src =
        "https://www.openstreetmap.org/export/embed.html?bbox=" +
        (lon-0.01) + "," + (lat-0.01) + "," + (lon+0.01) + "," + (lat+0.01) +
        "&layer=mapnik&marker=" + lat + "," + lon;
    }
  </script>

</body>
</html>
