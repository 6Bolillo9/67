mkdir -p /home/claude && cat > /home/claude/ubicacion.html << 'EOF'
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi ubicación</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        
        .container:hover {
            transform: translateY(-5px);
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .btn-ubicacion {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            font-weight: 600;
            letter-spacing: 1px;
        }
        
        .btn-ubicacion:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .btn-ubicacion:active {
            transform: translateY(0) scale(0.95);
        }
        
        .btn-ubicacion:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        #estado {
            margin: 25px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            color: #333;
            font-size: 1em;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #dee2e6;
            transition: all 0.3s ease;
        }
        
        #estado.cargando {
            border-color: #667eea;
            background: #f0f4ff;
        }
        
        #estado.exito {
            border-color: #28a745;
            background: #d4edda;
        }
        
        #estado.error {
            border-color: #dc3545;
            background: #f8d7da;
        }
        
        .coordenadas {
            font-weight: 600;
            color: #667eea;
        }
        
        #mapa {
            width: 100%;
            height: 400px;
            border: none;
            border-radius: 12px;
            display: none;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.5s ease;
        }
        
        #mapa.visible {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .btn-ubicacion {
                padding: 12px 30px;
                font-size: 1em;
                width: 100%;
            }
            
            #mapa {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📍 Mi ubicación</h1>
        
        <button class="btn-ubicacion" onclick="obtenerUbicacion()">
            📍 Obtener ubicación
        </button>
        
        <div id="estado">Haz clic en el botón para obtener tu ubicación</div>
        
        <iframe id="mapa"></iframe>
    </div>

    <script>
        const estado = document.getElementById("estado");
        const mapa = document.getElementById("mapa");
        const btn = document.querySelector(".btn-ubicacion");

        function actualizarEstado(mensaje, tipo = '') {
            estado.textContent = mensaje;
            estado.className = tipo;
        }

        function obtenerUbicacion() {
            btn.disabled = true;
            
            if (!navigator.geolocation) {
                actualizarEstado("❌ Tu navegador no soporta geolocalización.", 'error');
                btn.disabled = false;
                return;
            }

            actualizarEstado("⏳ Obteniendo ubicación...", 'cargando');
            mapa.className = '';
            mapa.style.display = 'none';

            navigator.geolocation.getCurrentPosition(
                function(posicion) {
                    const lat = posicion.coords.latitude;
                    const lon = posicion.coords.longitude;
                    const precision = posicion.coords.accuracy;

                    let precisionMsg = '';
                    if (precision < 50) {
                        precisionMsg = '🎯 Precisión excelente';
                    } else if (precision < 200) {
                        precisionMsg = '📍 Precisión buena';
                    } else {
                        precisionMsg = '📍 Precisión regular';
                    }

                    actualizarEstado(
                        `✅ Ubicación obtenida!\n` +
                        `<span class="coordenadas">Latitud: ${lat.toFixed(6)}</span> | ` +
                        `<span class="coordenadas">Longitud: ${lon.toFixed(6)}</span>\n` +
                        `📏 ${precisionMsg} (${precision.toFixed(0)}m)`,
                        'exito'
                    );

                    mapa.src = 
                        "https://www.openstreetmap.org/export/embed.html?bbox=" +
                        (lon - 0.01) + "," +
                        (lat - 0.01) + "," +
                        (lon + 0.01) + "," +
                        (lat + 0.01) +
                        "&layer=mapnik&marker=" + lat + "," + lon;
                    
                    mapa.style.display = 'block';
                    setTimeout(() => {
                        mapa.className = 'visible';
                    }, 50);
                    
                    btn.disabled = false;
                },
                function(error) {
                    let mensajeError = "";
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            mensajeError = "❌ Permiso denegado. Habilita la ubicación en tu navegador.";
                            break;
                        case error.POSITION_UNAVAILABLE:
                            mensajeError = "❌ Información de ubicación no disponible.";
                            break;
                        case error.TIMEOUT:
                            mensajeError = "❌ Tiempo de espera agotado. Intenta de nuevo.";
                            break;
                        default:
                            mensajeError = "❌ Error desconocido: " + error.message;
                    }
                    actualizarEstado(mensajeError, 'error');
                    btn.disabled = false;
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

        // Agregar soporte para tecla Enter
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                obtenerUbicacion();
            }
        });
    </script>
</body>
</html>
EOF
echo "✅ Archivo creado en /home/claude/ubicacion.html"
