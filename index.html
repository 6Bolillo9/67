mkdir -p /home/claude && cat > /home/claude/ubicacion.html << 'EOF'
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi ubicación</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        
        .container:hover {
            transform: translateY(-5px);
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }
        
        .btn-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .btn-ubicacion {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            font-weight: 600;
            letter-spacing: 1px;
        }
        
        .btn-ubicacion:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .btn-ubicacion:active {
            transform: translateY(0) scale(0.95);
        }
        
        .btn-ubicacion:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        #estado {
            margin: 25px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            color: #333;
            font-size: 1em;
            min-height: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed #dee2e6;
            transition: all 0.3s ease;
            text-align: center;
            line-height: 1.6;
        }
        
        #estado.cargando {
            border-color: #667eea;
            background: #f0f4ff;
        }
        
        #estado.exito {
            border-color: #28a745;
            background: #d4edda;
        }
        
        #estado.error {
            border-color: #dc3545;
            background: #f8d7da;
        }
        
        .coordenadas {
            font-weight: 600;
            color: #667eea;
        }
        
        #mapa {
            width: 100%;
            height: 400px;
            border-radius: 12px;
            display: none;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 1;
        }
        
        #mapa.visible {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .loader {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #dee2e6;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 8px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 1.8em; }
            .btn-ubicacion { padding: 12px 30px; font-size: 1em; width: 100%; }
            #mapa { height: 300px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📍 Mi ubicación</h1>
        
        <div class="btn-wrapper">
            <button class="btn-ubicacion" onclick="obtenerUbicacion()">
                📍 Obtener ubicación
            </button>
        </div>
        
        <div id="estado">Haz clic en el botón para obtener tu ubicación</div>
        
        <div id="mapa"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const estado = document.getElementById("estado");
        const mapaContenedor = document.getElementById("mapa");
        const btn = document.querySelector(".btn-ubicacion");
        let mapaObj = null;
        let marcadorObj = null;

        function actualizarEstado(htmlContenido, tipo = '') {
            estado.innerHTML = htmlContenido;
            estado.className = tipo;
        }

        function obtenerUbicacion() {
            btn.disabled = true;
            
            if (!navigator.geolocation) {
                actualizarEstado("❌ Tu navegador no soporta geolocalización.", 'error');
                btn.disabled = false;
                return;
            }

            actualizarEstado('<div class="loader"></div>⏳ Obteniendo ubicación...', 'cargando');
            mapaContenedor.className = '';
            mapaContenedor.style.display = 'none';

            navigator.geolocation.getCurrentPosition(
                function(posicion) {
                    const lat = posicion.coords.latitude;
                    const lon = posicion.coords.longitude;
                    const precision = posicion.coords.accuracy;

                    let precisionMsg = '';
                    if (precision < 50) {
                        precisionMsg = '🎯 Precisión excelente';
                    } else if (precision < 200) {
                        precisionMsg = '📍 Precisión buena';
                    } else {
                        precisionMsg = '📍 Precisión regular';
                    }

                    actualizarEstado(
                        `<strong>✅ ¡Ubicación obtenida!</strong>` +
                        `<span><span class="coordenadas">Latitud:</span> ${lat.toFixed(6)} | <span class="coordenadas">Longitud:</span> ${lon.toFixed(6)}</span>` +
                        `<span>Sub-métrica: ${precisionMsg} (${precision.toFixed(0)}m)</span>`,
                        'exito'
                    );

                    // Hacer visible el contenedor del mapa antes de inicializar Leaflet
                    mapaContenedor.style.display = 'block';
                    mapaContenedor.classList.add('visible');

                    // Inicializar o actualizar el mapa nativo sin recurrir a iframes externos
                    if (!mapaObj) {
                        mapaObj = L.map('mapa').setView([lat, lon], 16);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                            attribution: '&copy; OpenStreetMap'
                        }).addTo(mapaObj);
                        marcadorObj = L.marker([lat, lon]).addTo(mapaObj);
                    } else {
                        mapaObj.setView([lat, lon], 16);
                        marcadorObj.setLatLng([lat, lon]);
                    }

                    // Forzar el redibujado correcto debido al cambio dinámico de display
                    setTimeout(() => {
                        mapaObj.invalidateSize();
                    }, 200);
                    
                    btn.disabled = false;
                },
                function(error) {
                    let mensajeError = "";
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            mensajeError = "❌ Permiso denegado. Habilita la ubicación en tu navegador.";
                            break;
                        case error.POSITION_UNAVAILABLE:
                            mensajeError = "❌ Información de ubicación no disponible.";
                            break;
                        case error.TIMEOUT:
                            mensajeError = "❌ Tiempo de espera agotado. Intenta de nuevo.";
                            break;
                        default:
                            mensajeError = "❌ Error desconocido: " + error.message;
                    }
                    actualizarEstado(mensajeError, 'error');
                    btn.disabled = false;
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !btn.disabled) {
                obtenerUbicacion();
            }
        });
    </script>
</body>
</html>
EOF
echo "✅ Archivo creado y mejorado con éxito en /home/claude/ubicacion.html"
